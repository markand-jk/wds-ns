name: "🐞 Bug Report"
description: "Report a bug with full diagnostic details."
title: "[BUG] <add short title>"
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!  
        Please provide as much detail as possible.

  - type: input
    id: summary
    attributes:
      label: "Bug Summary"
      description: "Provide a clear and concise summary of the issue."
      placeholder: "Short description..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - "P0 - Critical"
        - "P1 - High"
        - "P2 - Medium"
        - "P3 - Low"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      options:
        - "Blocker"
        - "Critical"
        - "Major"
        - "Minor"
        - "Trivial"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "Affected Version"
      placeholder: "ex: v2.4.1"

  - type: dropdown
    id: environment
    attributes:
      label: "Environment"
      options:
        - "Production"
        - "Staging"
        - "QA"
        - "Development"
        - "Local"
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: "Component / Module"
      placeholder: "ex: Authentication Service, UI Header..."

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. Go to...
        2. Click...
        3. Scroll...
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "Impact Assessment"
      description: "Describe who is impacted, frequency, and business/user impact."

  - type: textarea
    id: criteria
    attributes:
      label: "Acceptance Criteria"
      placeholder: |
        - [ ] Condition 1
        - [ ] Condition 2
        - [ ] Condition 3

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Console Output"
      render: shell
      placeholder: "Paste logs here..."

  - type: textarea
    id: attachments
    attributes:
      label: "Screenshots or Videos"
      description: "Upload screenshots or drag & drop files."

  - type: checkboxes
    id: checks
    attributes:
      label: "Pre-Submission Checks"
      options:
        - label: "I have searched existing issues"
          required: true
        - label: "I have attached necessary logs/screenshots"
          required: false
