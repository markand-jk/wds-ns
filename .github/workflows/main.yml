name: Windows Driver Sample HLK Test (Build + HLK)

on:
  workflow_dispatch:

jobs:
  build-samples:
    runs-on: windows-2022

    strategy:
      matrix:
        arch: [ "x64", "ARM64" ]
        config: [ "Release" ]

    steps:
      - name: Build Driver
        uses: ./.github/workflows/build_ci.yml
        with:
          arch: ${{ matrix.arch }}
          config: ${{ matrix.config }}

  hlk-test
    runs-on: self-hosted

    strategy:
      matrix:
        category:
          - Debug
          - Filesystem
          - GPIO
          - IO
          - Multimedia
          - Network
          - PCI
          - Platform
          - Power
          - Security
          - Sensors
          - Storage
          - Tool
          - USB
          - Wireless

    steps:
      - name: HLK Testing
        uses: ./.github/workflows/hlk_ci.yml
        with:
          category: ${{ matrix.category }}


