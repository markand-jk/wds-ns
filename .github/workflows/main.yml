name: Windows Driver Sample HLK Test (Build + HLK)
on:
  workflow_dispatch:
    inputs:
      driverType:
        description: "Select driver type"
        type: choice
        required: true
        default: "Multimedia"
        options:
          - Multimedia
          - Default

jobs:
  # build-samples:
  #   uses: markand-jk/wds-ns/.github/workflows/build_ci.yml@main
  #   secrets: inherit

  hlk-test:
    # needs: build-samples
    uses: markand-jk/wds-ns/.github/workflows/hlk_ci.yml@main
    with:
      driverType: ${{ inputs.driverType }}
    secrets: inherit
