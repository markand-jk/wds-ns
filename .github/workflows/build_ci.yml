name: Build Drivers

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022

    env:
      PLATFORM: "${{ inputs.platform }}"
      CONFIG: "RELEASE"
      WDS_PATH: "${{ github.workspace }}\\windows-driver-samples"
      OUTPUT_PATH: "${{ github.workspace }}\\extracted_drivers"

    steps:
      - name: Checkout NS
        uses: actions/checkout@v4

      - name: Checkout Microsoft Driver Samples
        uses: actions/checkout@v4
        with:
          repository: microsoft/Windows-driver-samples
          path: ${{ env.WDS_PATH }}
          submodules: recursive

      - name: Delete Other Drivers (For Now...)
        shell: pwsh
        run: |
          Write-Host "[+] Delete other drivers, except multimedia drivers"
          cd "$env:WDS_PATH"
          #Remove-Item "bluetooth" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "filesys" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "general" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "gnss" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "gpio" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "hid" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "input" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "network" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "nfc" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "nfp" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "pofx" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "pos" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "powerlimit" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "print" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "prm" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "sd" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "security" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "sensors" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "serial" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "setup" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "simbatt" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "smartcrd" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "spb" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "storage" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "thermal" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "tools" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "TrEE" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "usb" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "video" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "wia" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "wmi" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Load Driver Data JSON
        shell: pwsh
        run: |
          $Platform = "${{ env.PLATFORM }}"
          $Config   = "${{ env.CONFIG }}"

          $jsonPath = Join-Path $Env:GITHUB_WORKSPACE "driver-data.json"
          Write-Host "Reading JSON from: $jsonPath"
          Write-Host ">>$Platform, $Config"

          $json = Get-Content $jsonPath -Raw
          $json = $ExecutionContext.InvokeCommand.ExpandString($json)
          $driverData = $json | ConvertFrom-Json
          $driverJson = $driverData | ConvertTo-Json -Depth 10

          Add-Content $Env:GITHUB_ENV "DRIVER_DATA<<EOF"
          Add-Content $Env:GITHUB_ENV $driverJson
          Add-Content $Env:GITHUB_ENV "EOF"

      # - name: Download and Extract CodeQL CLI
      #   shell: pwsh
      #   run: |
      #     $CodeqlZip = "codeql-win64.zip"
      #     $DownloadUrl = "https://github.com/github/codeql-cli-binaries/releases/download/v2.15.4/codeql-win64.zip"

      #     Write-Host "[+] Downloading CodeQL CLI v2.15.4..."
      #     curl.exe -L -o $CodeqlZip $DownloadUrl

      #     Write-Host "[+] Extracting CodeQL..."
      #     # tar is built-in to Windows Server 2022
      #     tar.exe -xf $CodeqlZip

      #     Write-Host "[+] Cleaning up zip..."
      #     Remove-Item $CodeqlZip

      #     Write-Host "[+] Verifying CodeQL installation..."
      #     & $env:CODEQL_BIN --version

      - name: Install Nuget Packages
        run: |
          cd "$env:WDS_PATH"
          nuget restore .\packages.config -PackagesDirectory .\packages\
      #     dir

      # - name: Initialize CodeQL Packs
      #   shell: pwsh
      #   run: |
      #     Write-Host "[+] Download Pack microsoft/windows-drivers@1.0.13..."
      #     & $env:CODEQL_BIN pack download microsoft/windows-drivers@1.0.13

      #     Write-Host "[+] Download Pack codeql/cpp-queries@0.9.0..."
      #     & $env:CODEQL_BIN pack download codeql/cpp-queries@0.9.0

      # - name: Creating CodeQL Database & Build Drivers
      #   shell: pwsh
      #   run: |
      #     Write-Host "[+] Creating CodeQL Database..."

      #     # Use & (call operator) with $env: variables
      #     & $env:CODEQL_BIN database create "$env:X64_DB_PATH" `
      #         --language=cpp `
      #         --command "pwsh -NoProfile -ExecutionPolicy Bypass -Command `"cd '$env:WDS_PATH'; ./Build-AllSamples.ps1 -Configuration Release -Platform x64 -Verbose`""

      #     if ($LASTEXITCODE -ne 0) {
      #         Write-Error "[!] Database creation failed with error $LASTEXITCODE"
      #         exit $LASTEXITCODE
      #     }

      # - name: Creating CodeQL Database & Build Drivers
      #   shell: pwsh
      #   run: |
      #     Write-Host "[+] Creating CodeQL Database..."

      #     # Use & (call operator) with $env: variables
      #     & $env:CODEQL_BIN database create "$env:X64_DB_PATH" `
      #         --language=cpp `
      #         --command "pwsh -NoProfile -ExecutionPolicy Bypass -Command `"cd '$env:WDS_PATH'; ./Build-AllSamples.ps1 -Configuration Release -Platform x64 -Verbose`""

      #     if ($LASTEXITCODE -ne 0) {
      #         Write-Error "[!] Database creation failed with error $LASTEXITCODE"
      #         exit $LASTEXITCODE
      #     }

      - name: Build Drivers
        shell: pwsh
        run: |
          cd "$env:WDS_PATH"
          # dir
          ./Build-Samples.ps1 -Verbose
        env:
          WDS_Configuration: ${{ Env.CONFIG }}
          WDS_Platform: ${{ Env.PLATFORM }}
        #   WDS_ReportFileName: _overview.${{ matrix.configuration }}.${{ matrix.platform }}

      - name: Extract Driver Binaries
        shell: pwsh
        run: |
          $json = $Env:DRIVER_DATA
          $driverData = $json | ConvertFrom-Json

          Write-Host "--- Starting Extraction for ${{ Env.PLATFORM }}-${{ Env.CONFIG }} ---" -ForegroundColor Cyan
          foreach ($entry in $driverData) {
              $category    = $entry[1]
              $driverName  = $entry[2]
              $relativeSrc = $entry[3]
              $fullSrcPath = Join-Path $env:WDS_PATH $relativeSrc
              $destFolder = Join-Path $env:OUTPUT_PATH "${{ Env.PLATFORM }}-${{ Env.CONFIG }}\$category\$driverName"
              Write-Host "Processing $driverName..." -ForegroundColor Gray
              if (Test-Path $fullSrcPath) {
                  if (!(Test-Path $destFolder)) { New-Item -ItemType Directory -Path $destFolder -Force | Out-Null }
                  Write-Host "  SUCCESS: Copying from $fullSrcPath" -ForegroundColor Green
                  Copy-Item -Path "$fullSrcPath.cer" -Destination "$fullSrcPath" -Force -Recurse -ErrorAction SilentlyContinue
                  Copy-Item -Path "$fullSrcPath\*" -Destination $destFolder -Force -Recurse -ErrorAction SilentlyContinue
              } else {
                  Write-Host "  X ERROR: Source not found: $fullSrcPath" -ForegroundColor Yellow
              }
          }
          Write-Host "`nExtraction Complete!" -ForegroundColor White
          cd $env:OUTPUT_PATH
          tree /f /a

      - name: Upload Driver Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-drivers-binaries
          path: ${{ env.OUTPUT_PATH }}
          if-no-files-found: warn

      - name: Print Driver Data JSON
        shell: pwsh
        run: |
          $json = $Env:DRIVER_DATA
          $driverData = $json | ConvertFrom-Json

          $driverData | ForEach-Object { $_ }
