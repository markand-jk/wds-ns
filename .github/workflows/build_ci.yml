      - name: Build Drivers
        shell: pwsh
        run: |
          cd "$env:WDS_PATH"
          ./Build-AllSamples.ps1 -Configuration ${{ env.CONFIG }} -Platform ${{ env.PLATFORM }} -Verbose
        # env:
        #   WDS_Configuration: ${{ matrix.configuration }}
        #   WDS_Platform: ${{ matrix.platform }}
        #   WDS_ReportFileName: _overview.${{ matrix.configuration }}.${{ matrix.platform }}

      - name: Print Driver Data JSON
        shell: pwsh
        run: |
          $json = $Env:DRIVER_DATA
          $driverData = $json | ConvertFrom-Json

          $driverData | ForEach-Object { $_ }
