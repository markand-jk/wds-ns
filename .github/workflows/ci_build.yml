name: Build WDS

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Driver Samples
    runs-on: windows-2022

    env:
      WDS_PATH: "${{ github.workspace }}\\windows-driver-samples"
      CODEQL_BIN: "${{ github.workspace }}\\codeql\\codeql.exe"
      X64_DB_PATH: "${{ github.workspace }}\\wds-release-x64"
      ARM64_DB_PATH: "${{ github.workspace }}\\wds-release-x64"
      DEST: "${{ github.workspace }}\\extracted_drivers"

    steps:
      - name: Checkout Microsoft Driver Samples
        uses: actions/checkout@v4
        with:
          repository: microsoft/Windows-driver-samples
          path: ${{ env.WDS_PATH }}
          submodules: recursive

      - name: Download and Extract CodeQL CLI
        shell: pwsh
        run: |
          $CodeqlZip = "codeql-win64.zip"
          $DownloadUrl = "https://github.com/github/codeql-cli-binaries/releases/download/v2.15.4/codeql-win64.zip"

          Write-Host "[+] Downloading CodeQL CLI v2.15.4..."
          curl.exe -L -o $CodeqlZip $DownloadUrl

          Write-Host "[+] Extracting CodeQL..."
          # tar is built-in to Windows Server 2022
          tar.exe -xf $CodeqlZip

          Write-Host "[+] Cleaning up zip..."
          Remove-Item $CodeqlZip

          Write-Host "[+] Verifying CodeQL installation..."
          & $env:CODEQL_BIN --version

      - name: Delete Other Drivers (For Now...)
        shell: pwsh
        run: |
          Write-Host "[+] Delete other drivers, except audio"
          cd "$env:WDS_PATH"
          Remove-Item "TrEE" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "bluetooth" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "filesys" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "g*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "hid" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "n*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "p*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "s*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "t*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "usb" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "video" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "wia" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "wmi" -Recurse -Force -ErrorAction SilentlyContinue
          dir
          exit 1

      - name: Initialize CodeQL Packs
        shell: pwsh
        run: |
          Write-Host "[+] Download Pack microsoft/windows-drivers@1.0.13..."
          & $env:CODEQL_BIN pack download microsoft/windows-drivers@1.0.13

          Write-Host "[+] Download Pack codeql/cpp-queries@0.9.0..."
          & $env:CODEQL_BIN pack download codeql/cpp-queries@0.9.0

      - name: Creating CodeQL Database & Build Drivers
        shell: pwsh
        run: |
          Write-Host "[+] Creating CodeQL Database..."

          # Use & (call operator) with $env: variables
          & $env:CODEQL_BIN database create "$env:X64_DB_PATH" `
              --language=cpp `
              --command "pwsh -NoProfile -ExecutionPolicy Bypass -Command `"cd '$env:WDS_PATH'; ./Build-AllSamples.ps1 -Configuration Release -Platform x64 -Verbose`""

          if ($LASTEXITCODE -ne 0) {
              Write-Error "[!] Database creation failed with error $LASTEXITCODE"
              exit $LASTEXITCODE
          }

      - name: Extract Driver Binaries
        shell: pwsh
        run: |
          $Dest = "$env:DEST\x64"
          if (!(Test-Path $Dest)) { New-Item -ItemType Directory -Path $Dest -Force }

          Write-Host "[+] Searching for x64 Release binaries in $env:WDS_PATH..."

          # Find directories named 'x64' that are within a 'Release' path
          Get-ChildItem -Path "$env:WDS_PATH" -Recurse -Directory |
            Where-Object { $_.Name -eq "x64" -and $_.FullName -like "*Release*" } |
            ForEach-Object {
                $src = $_.FullName
                Write-Host "  -> Extracting from: $src"

                # Copy driver package files (sys, inf, cat, pdb)
                Get-ChildItem -Path $src -Include *.sys, *.inf, *.cat, *.pdb -File | ForEach-Object {
                    Copy-Item -Path $_.FullName -Destination $Dest -Force -ErrorAction SilentlyContinue
                }
            }

      - name: Upload Driver Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-drivers-binaries
          path: ${{ env.DEST }}
          if-no-files-found: warn
