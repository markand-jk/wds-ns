  hlk-run:
    needs: download-artifacts
    runs-on: self-hosted

    strategy:
      max-parallel: 5
      matrix:
        platform:
          - "Win11_25H2_x64"

  #   #       - { Name: "Windows10_x86"     }
  #   #       - { Name: "Windows10_x64"     }
  #   #       - { Name: "Win11_22H2_x64"    }
  #   #       - { Name: "Win11_23H2_x64"    }
  #   #       - { Name: "Win11_24H2_x64"    }
  #   #       - { Name: "Win11_25H2_x64"    }
  #   #       - { Name: "Win11_26H1_x64"    }
  #   #       - { Name: "Win11_24H2_arm64"  }
  #   #       - { Name: "Win11_25H2_arm64"  }
  #   #       - { Name: "Win11_26H2_arm64"  }


    env:
      defaultPassword: ${{ secrets.DEFAULT_PASSWORD }}
      platform: ${{ matrix.platform }}
      WORKSPACE_RUNNER: "c:\\hlktest\\"
      WORKSPACE_DUT: "c:\\hlktest\\"
      WORKSPACE_CTRLR: "c:\\hlktest\\"
      DRIVER_BINDIR: "build-artifacts"


    steps:
      - name: Checkout NS
        uses: actions/checkout@v4

      - name: Get Controller & DUT Information
        shell: powershell
        run: |
          $servers = Get-Content "machine-data.json" -Raw | ConvertFrom-Json
          $server = $servers | Where-Object { $_.platform -eq $Env:platform }
          if (-not $server) {
              throw "No server configuration found for platform: $Env:platform"
          }
          Add-Content $Env:GITHUB_ENV "PLATFORM_TYPE=$($server.platformType)"

          Add-Content $Env:GITHUB_ENV "CONTROLLER_HOSTNAME=$($server.controller.ip)"
          Add-Content $Env:GITHUB_ENV "CONTROLLER_USER=$($server.controller.username)"
          Add-Content $Env:GITHUB_ENV "CONTROLLER_PASSWORD=$($Env:defaultPassword)"

          Add-Content $Env:GITHUB_ENV "DUT_HOSTNAME=$($server.dut.ip)"
          Add-Content $Env:GITHUB_ENV "DUT_USER=$($server.dut.username)"
          Add-Content $Env:GITHUB_ENV "DUT_PASSWORD=$($Env:defaultPassword)"

      - name: Print Controller & DUT Information
        shell: powershell
        run: |
          Write-Host "DUT: $Env:CONTROLLER_HOSTNAME, $Env:CONTROLLER_USER, $Env:CONTROLLER_PASSWORD"
          Write-Host "DUT: $Env:DUT_HOSTNAME, $Env:DUT_USER, $Env:DUT_PASSWORD"
          $PSVersionTable
          where powershell
          where pwsh
          $env:PATH -split ';'

      - name: Install Drivers to DUT
        shell: pwsh
        run: |
          $machine = $Env:DUT_HOSTNAME
          $user = $Env:DUT_USER
          $password = $Env:DUT_PASSWORD
          $pass = ConvertTo-SecureString $password -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential (
              "$machine\$user",
              $pass
          )
          $session = New-PSSession -ComputerName $machine -Credential $cred `
            -Authentication Negotiate

          Invoke-Command -Session $session -ScriptBlock {
              Remove-Item -Path "$Env:WORKSPACE_DUT" -Recurse -Force
              New-Item -Path "$Env:WORKSPACE_DUT" -ItemType Directory -Force -ErrorAction Stop | Out-Null
          }

          Write-Host "Copying the driver binary archives...."
          Copy-Item
            -Path "$Env:WORKSPACE_RUNNER\\$Env:DRIVER_BINDIR\\$Env:PLATFORM_TYPE" `
            -Destination "$Env:WORKSPACE_DUT" `
            -Recurse
            -ToSession $session

          Write-Host "Copying the devcon utility...."
          Copy-Item
            -Path "$Env:WORKSPACE_RUNNER\\devcon.exe"
            -Destination "$Env:WORKSPACE_DUT\\"
            -ToSession $session


          # $sec = ConvertTo-SecureString $password -AsPlainText -Force
