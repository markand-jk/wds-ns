  hlk-run:
    # needs: download-artifacts
    runs-on: self-hosted

    strategy:
      max-parallel: 5
      matrix:
        os:
          - "Win11_25H2_x64"
  #   #       - { Name: "Windows10_x86"     }
  #   #       - { Name: "Windows10_x64"     }
  #   #       - { Name: "Win11_22H2_x64"    }
  #   #       - { Name: "Win11_23H2_x64"    }
  #   #       - { Name: "Win11_24H2_x64"    }
  #   #       - { Name: "Win11_25H2_x64"    }
  #   #       - { Name: "Win11_26H1_x64"    }
  #   #       - { Name: "Win11_24H2_arm64"  }
  #   #       - { Name: "Win11_25H2_arm64"  }
  #   #       - { Name: "Win11_26H2_arm64"  }

    env:
      defaultPassword: ${{ secrets.DEFAULT_PASSWORD }}
      os: ${{ matrix.os }}

    steps:
      - name: Checkout NS
        uses: actions/checkout@v4

      - name: Get Controller / DUT Information
        shell: powershell
        run: |
          $servers = Get-Content "machine-data.json" -Raw | ConvertFrom-Json
          $server = $servers | Where-Object { $_.os -eq $Env:os }
          if (-not $server) {
              throw "No server configuration found for OS: $Env:os"
          }

          Add-Content $Env:GITHUB_ENV "PLATFORM=$($server.platform)"
          Add-Content $Env:GITHUB_ENV "CONTROLLER_HOSTNAME=$($server.controller.ip)"
          Add-Content $Env:GITHUB_ENV "CONTROLLER_USER=$($server.controller.username)"
          Add-Content $Env:GITHUB_ENV "CONTROLLER_PASSWORD=$($Env:defaultPassword)"

          Add-Content $Env:GITHUB_ENV "DUT_HOSTNAME=$($server.dut.ip)"
          Add-Content $Env:GITHUB_ENV "DUT_USER=$($server.dut.username)"
          Add-Content $Env:GITHUB_ENV "DUT_PASSWORD=$($Env:defaultPassword)"

      - name: Load Driver Data JSON
        shell: pwsh
        run: |
          $jsonPath = Join-Path $Env:GITHUB_WORKSPACE "driver-data.json"
          Write-Host "Reading JSON from: $jsonPath"

          $Platform = $Env:PLATFORM
          $Config = $Env:CONFIG

          $json = Get-Content $jsonPath -Raw
          $json = $ExecutionContext.InvokeCommand.ExpandString($json)

          $drivers = ($json | ConvertFrom-Json) | Where-Object type -eq ${{ inputs.driverType }}
          $driversJson = $drivers | ConvertTo-Json -Compress
          "DRIVERS=$driversJson" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Print Controller / DUT & Driver Information
        shell: powershell
        run: |
          Write-Host "DUT: $Env:CONTROLLER_HOSTNAME, $Env:CONTROLLER_USER, $Env:CONTROLLER_PASSWORD"
          Write-Host "DUT: $Env:DUT_HOSTNAME, $Env:DUT_USER, $Env:DUT_PASSWORD"

          $drivers = $Env:DRIVERS | ConvertFrom-Json
          $drivers | ForEach-Object { $_ }

      - name: Install Drivers to DUT
        shell: pwsh
        run: |
          # Get driver list from ENV
          $drivers = $Env:DRIVERS | ConvertFrom-Json

          # Setup connection with the DUT
          $machine = $Env:DUT_HOSTNAME
          $user = $Env:DUT_USER
          $password = $Env:DUT_PASSWORD
          $pass = ConvertTo-SecureString $password -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential (
              "$machine\$user",
              $pass
          )
          $session = New-PSSession -ComputerName $machine -Credential $cred `
            -Authentication Negotiate

          Write-Host "Cleanup of $Env:HLK_WORKSPACE on HOST"
          Invoke-Command -Session $session -ScriptBlock {
              param($workspace)
              if (Test-Path $workspace) {
                  Remove-Item -Path $workspace -Recurse -Force
              }
              New-Item -Path $workspace -ItemType Directory -Force -ErrorAction Stop | Out-Null
          } -ArgumentList $Env:HLK_WORKSPACE

          Write-Host "Copying the driver binary artifacts...."
          Write-Host "$Env:HLK_WORKSPACE\$Env:DRIVER_BINDIR\$Env:PLATFORM => $Env:HLK_WORKSPACE"
          Copy-Item `
            -Path "$Env:HLK_WORKSPACE\$Env:DRIVER_BINDIR\$Env:PLATFORM" `
            -Destination "$Env:HLK_WORKSPACE" `
            -Recurse `
            -ToSession $session

          Write-Host "Copying the devcon utility...."
          Copy-Item `
            -Path "$Env:HLK_WORKSPACE\devcon.exe" `
            -Destination "$Env:HLK_WORKSPACE" `
            -ToSession $session

          Write-Host "Installing drivers...."
          foreach ($driver in $drivers) {
            Invoke-Command -Session $session -ScriptBlock {
              param($workspace, $platform, $driver)

              $driverPath = Join-Path $workspace `
                      "$platform\$($driver.DriverCategory)\$($driver.Driver)"

                Write-Host ">>> $driverPath"

                Write-Host "Copy devcon.exe to driver directory..."
                Copy-Item -Path "$workspace\devcon.exe" -Destination $driverPath

                Write-Host "Changing directory to: $driverPath"
                Set-Location $driverPath

                Get-ChildItem | Format-Table -AutoSize

            } -ArgumentList $Env:HLK_WORKSPACE, $Env:PLATFORM, $driver
          }

          # Invoke-Command -Session $session -ScriptBlock {
          #     param($platform, $config, $d)

          #     $infPath = "c:\drivertest\$platform-$config\$($d.category)\$($d.driverName)"

          #     Write-Host "Copy devcon.exe to driver directory..."
          #     Copy-Item -Path "c:\drivertest\devcon.exe" -Destination $infPath

          #     # Change Directory to Driver INF Location
          #     Write-Host "Changing directory to: $infPath"
          #     Set-Location $infPath

          #     Get-ChildItem | Format-Table -AutoSize

          #     Write-Host "Execute the Install Command:"
          #     Write-Host $($d.installCmd)

          #     Write-Host "Check Driver Install Status:"
          #     Invoke-Expression $($d.verifyCmd)
          # } -ArgumentList $Platform, $Config, $driverData[0]
