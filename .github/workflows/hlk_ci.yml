name: HLK Testing

on:
  workflow_call:
    inputs:
      driverType:
        required: true
        type: string

jobs:
  download-artifacts:
    runs-on: self-hosted

    steps:
      # - name: Cleanup Workspace
      #   shell: powershell
      #   run: |
      #     Write-Host "Cleaning workspace: $Env:GITHUB_WORKSPACE"
      #     Remove-Item -Path (Join-Path $Env:GITHUB_WORKSPACE '*') -Recurse -Force

      # - name: Download all driver build artifacts
      #   uses: actions/download-artifact@v4
      #   with:
      #     path: build-artifacts

      - name: Verify downloaded artifacts
        shell: powershell
        run: |
          Write-Host "Downloaded artifacts:"
          # Get-ChildItem -Recurse build-artifacts

  hlk-run:
    needs: download-artifacts
    runs-on: self-hosted

    strategy:
      max-parallel: 5
      matrix:
        platform:
          - "Win11_25H2_x64"

  #   #       - { Name: "Windows10_x86"     }
  #   #       - { Name: "Windows10_x64"     }
  #   #       - { Name: "Win11_22H2_x64"    }
  #   #       - { Name: "Win11_23H2_x64"    }
  #   #       - { Name: "Win11_24H2_x64"    }
  #   #       - { Name: "Win11_25H2_x64"    }
  #   #       - { Name: "Win11_26H1_x64"    }
  #   #       - { Name: "Win11_24H2_arm64"  }
  #   #       - { Name: "Win11_25H2_arm64"  }
  #   #       - { Name: "Win11_26H2_arm64"  }


    env:
      defaultPassword: ${{ secrets.DEFAULT_PASSWORD }}


    steps:
      - name: Checkout NS
        uses: actions/checkout@v4

      - name: Verify artifacts are available
        shell: powershell
        run: |
          Write-Host "Artifacts available for HLK: ${{ matrix.platform }}"

      - name: Get machine info
        shell: powershell
        run: |
          $platform = "${{ matrix.platform }}"
          $servers = Get-Content "machine-data.json" -Raw | ConvertFrom-Json

          $server = $servers | Where-Object { $_.platform -eq $platform }

          if (-not $server) {
              throw "No server configuration found for platform: $platform"
          }

          # # Controller info
          # $controllerIp   = $server.controller.ip
          # $controllerUser = $server.controller.username
          # $controllerPass = $Env:defaultPassword

          # # DUT info
          # $dutIp   = $server.dut.ip
          # $dutUser = $server.dut.username
          # $dutPass = $Env:defaultPassword



          Add-Content $Env:GITHUB_ENV "CONTROLLER_IP=$($server.controller.ip)"
          Add-Content $Env:GITHUB_ENV "CONTROLLER_USER=$($server.controller.username)"
          Add-Content $Env:GITHUB_ENV "CONTROLLER_PASSWORD=$($Env:defaultPassword)"

          Add-Content $Env:GITHUB_ENV "DUT_IP==$($server.dut.ip)"
          Add-Content $Env:GITHUB_ENV "DUT_USER==$($server.dut.username)"
          Add-Content $Env:GITHUB_ENV "DUT_PASSWORD=$($Env:defaultPassword)"


      - name: Verify artifacts are available
        shell: powershell
        run: |
          Write-Host "DUT: $Env:CONTROLLER_IP, $Env:CONTROLLER_USER, $Env:CONTROLLER_PASSWORD"
          Write-Host "DUT: $Env:DUT_IP, $Env:DUT_USER, $Env:DUT_PASSWORD"
