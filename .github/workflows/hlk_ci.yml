name: HLK Testing

on:
  workflow_call:
    inputs:
      driverType:
        required: true
        type: string

env:
  HLK_WORKSPACE: "c:\hlktesting"
  DRIVER_DOWNLOAD_DIR: "build-artifacts"

jobs:
  download-artifacts:
    runs-on: self-hosted

    steps:
      - name: Cleanup Workspace
        shell: powershell
        run: |
          Write-Host "Cleaning workspace: $Env:GITHUB_WORKSPACE"
          Remove-Item -Path (Join-Path $Env:GITHUB_WORKSPACE '*') -Recurse -Force

      - name: Check for the HLK_WORKSPACE
        shell: powershell
        run: |
          if (Test-Path $Env:HLK_WORKSPACE) {
            throw "HLK_WORKSPACE does not exist: $Env:HLK_WORKSPACE"
          }

      - name: Download all driver build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.DRIVER_DOWNLOAD_DIR }}

      - name: Copy driver build artifacts
        shell: powershell
        run: |
          if (Test-Path (Join-Path $Env:GITHUB_WORKSPACE $Env:DRIVER_DOWNLOAD_DIR)) {
              Remove-Item -Path (Join-Path $Env:GITHUB_WORKSPACE $Env:DRIVER_DOWNLOAD_DIR) -Recurse -Force
          }
          Copy-Item `
            -Path (Join-Path $Env:GITHUB_WORKSPACE $Env:DRIVER_DOWNLOAD_DIR) `
            -Destination (Join-Path $Env:HLK_WORKSPACE $Env:DRIVER_DOWNLOAD_DIR) `
            -Recurse

          Get-ChildItem -Recurse $Env:HLK_WORKSPACE

